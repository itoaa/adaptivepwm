; PlatformIO Project Configuration File
; AdaptivePWM - CISSP-Aligned Security Framework
;
; Build configurations with framework enforcement

[platformio]
src_dir = src
include_dir = include
test_dir = tests
data_dir = data

; Custom targets for framework enforcement
extra_scripts = 
    pre:ci/framework_check.py

[common]
platform = ststm32
board = nucleo_f401re
framework = stm32cube

; Security and quality flags
build_flags = 
    -DUSE_HAL_DRIVER
    -DSTM32F401xE
    -Iinclude
    -Wall
    -Wextra
    -Werror=implicit-function-declaration
    -Werror=return-type
    -Werror=uninitialized

; Check script settings
check_tool = cppcheck, clangtidy
check_flags =
    --enable=all
    --suppress=missingInclude
    --suppress=unmatchedSuppression

[env:nucleo_f401re]
extends = common
build_type = release
build_flags = 
    ${common.build_flags}
    -Os
    -DNDEBUG
    -DSECURITY_CHECKS
    -DWATCHDOG_ENABLED

; Framework pre-build check
custom_pre_build = ci/enforce_framework.sh

[env:nucleo_f401re_debug]
extends = common
build_type = debug
build_flags = 
    ${common.build_flags}
    -Og
    -g3
    -DDEBUG
    -DCLI_ENABLED
    -DASSERT_ENABLED

; Extra debug flags
debug_build_flags = -O0 -g3 -ggdb

[env:nucleo_f401re_profile]
extends = common
build_type = debug
build_flags = 
    ${common.build_flags}
    -O2
    -g2
    -pg
    -DPROFILE_ENABLED
    -DCOVERAGE_ENABLED

; Test environment
[env:nucleo_f401re_test]
extends = common
build_type = debug
build_flags = 
    ${common.build_flags}
    -Og
    -g3
    -DTEST_MODE
    -DMOCK_HARDWARE

; CI/CD Environment
[env:ci]
extends = common
build_type = release
build_flags = 
    ${common.build_flags}
    -Os
    -DNDEBUG
    -DCI_BUILD
    -Werror  ; Treat all warnings as errors

test_build_src = yes
